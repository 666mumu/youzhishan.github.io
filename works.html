        <div class="text-box">
            <p>泸州油纸伞作品风格多样、题材丰富，依托传统手绘工艺，融合中式古典美学与现代审美。每一把油纸伞均为匠人手工绘制，没有完全重复的纹样，兼具独特性与艺术性，是传统手工艺的绝佳载体。以下为经典系列非遗作品展示。</p>
